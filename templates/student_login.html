<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | EduPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl shadow-slate-200/60 p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl mb-4">
                <i data-lucide="user-check" class="w-6 h-6"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Student Login</h2>
            <p class="text-slate-500 text-sm mt-1">Enter your credentials to access your dashboard</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </span>
                    <input type="text" id="username" name="username" required
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                           placeholder="e.g. john_doe123">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" name="password" required
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                           placeholder="••••••••">
                </div>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100 flex items-center">
                <i data-lucide="alert-circle" class="w-4 h-4 mr-2"></i>
                <span id="errorText"></span>
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center">
                <span>Sign In</span>
                <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-slate-500 text-sm">
                New here?
                <a href="/student/signup" class="text-indigo-600 font-bold hover:underline">Create an account</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const btn = document.getElementById("submitBtn");
            const errorDiv = document.getElementById("errorMessage");
            const errorText = document.getElementById("errorText");

            // UI Loading State
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Authenticating...</span>`;
            errorDiv.classList.add("hidden");

            try {
                // We use FormData to match your Flask request.form.get() logic
                const formData = new FormData();
                formData.append('username', document.getElementById("username").value);
                formData.append('password', document.getElementById("password").value);

                const res = await fetch("/login/student", {
                    method: "POST",
                    body: formData // Backend uses request.form.get()
                });

                if (res.redirected) {
                    // Flask returns redirect("/student/dashboard")
                    window.location.href = res.url;
                } else {
                    // If Flask returns render_template with error
                    errorText.innerText = "Invalid username or password";
                    errorDiv.classList.remove("hidden");
                    btn.disabled = false;
                    btn.innerHTML = `<span>Sign In</span><i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>`;
                    lucide.createIcons();
                }
            } catch (err) {
                errorText.innerText = "Connection error. Please try again.";
                errorDiv.classList.remove("hidden");
                btn.disabled = false;
                btn.innerHTML = `<span>Sign In</span>`;
            }
        });
    </script>
</body>
</html>
