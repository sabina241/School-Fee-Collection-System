<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | EduPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .admin-bg {
            background: radial-gradient(circle at bottom right, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="admin-bg min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 border border-slate-200">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-100 text-slate-900 rounded-2xl mb-4">
                <i data-lucide="user-plus" class="w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Admin Signup</h2>
            <p class="text-slate-500 mt-2">Register a new administrative account</p>
        </div>

        <form id="adminSignupForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i data-lucide="signature" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="name" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all font-medium"
                           placeholder="Enter your full name">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">System Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="username" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all font-medium"
                           placeholder="e.g. admin_main">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Master Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i data-lucide="lock-keyhole" class="w-5 h-5"></i>
                    </span>
                    <input type="password" id="password" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all font-medium"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-900/20 transition-all flex items-center justify-center gap-3 group mt-4">
                <span>Create Admin Account</span>
                <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-slate-500 text-sm font-medium">
                Already have access?
                <a href="/admin/login" class="text-slate-900 font-bold hover:underline">Log in here</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById("adminSignupForm").onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");

            const name = document.getElementById("name").value;
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>Creating Account...</span>`;
            lucide.createIcons();

            try {
                const res = await fetch("/signup/admin", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ name, username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message || "Admin registered successfully!");
                    if (data.redirect) window.location.href = data.redirect;
                } else {
                    throw new Error(data.error || "Signup failed");
                }
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerHTML = `<span>Create Admin Account</span><i data-lucide="arrow-right" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>
