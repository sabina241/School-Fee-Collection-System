<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authentication | EduPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .admin-gradient {
            background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="admin-gradient min-h-screen flex items-center justify-center p-6">

    <div class="bg-white/95 backdrop-blur-md w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 border border-slate-700/10">

        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-900 text-white rounded-3xl mb-6 shadow-xl shadow-slate-900/20">
                <i data-lucide="shield-check" class="w-10 h-10 text-indigo-400"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Admin Portal</h2>
            <p class="text-slate-500 mt-2 font-medium">Authorized personnel access only</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Admin Username</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <i data-lucide="user-cog" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="username" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all font-medium text-slate-800"
                           placeholder="Enter username">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Secure Password</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <i data-lucide="key-round" class="w-5 h-5"></i>
                    </span>
                    <input type="password" id="password" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all font-medium text-slate-800"
                           placeholder="••••••••">
                </div>
            </div>

            <div id="errorBox" class="hidden animate-shake bg-rose-50 text-rose-600 p-4 rounded-2xl border border-rose-100 flex items-center gap-3">
                <i data-lucide="alert-octagon" class="w-5 h-5"></i>
                <span id="errorMsg" class="text-sm font-semibold"></span>
            </div>

            <button onclick="loginAdmin()" id="loginBtn"
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg shadow-slate-900/20 transition-all flex items-center justify-center gap-3 group">
                <span>Verify & Enter</span>
                <i data-lucide="chevron-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <div class="mt-10 text-center">
            <p class="text-slate-400 text-xs">
                Need admin credentials?
                <a href="/admin/signup" class="text-indigo-600 font-bold hover:underline">Register here</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function loginAdmin() {
            const btn = document.getElementById("loginBtn");
            const errorBox = document.getElementById("errorBox");
            const errorMsg = document.getElementById("errorMsg");

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if(!username || !password) return;

            // Loading state
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>Authenticating...</span>`;
            lucide.createIcons();
            errorBox.classList.add("hidden");

            try {
                const response = await fetch("/login/admin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    throw new Error(data.error || "Access Denied");
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorBox.classList.remove("hidden");

                // Reset button
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = `<span>Verify & Enter</span><i data-lucide="chevron-right" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
