<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | EduPay Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .role-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full text-center">
        <div class="mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                <i data-lucide="school" class="w-8 h-8"></i>
            </div>
            <h1 class="text-4xl font-bold text-slate-900 tracking-tight">EduPay Portal</h1>
            <p class="text-slate-500 mt-2 text-lg">Select your account type to continue</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div onclick="location.href='/student/login'"
                 class="role-card group cursor-pointer bg-white p-8 rounded-3xl shadow-sm border border-slate-200 transition-all duration-300 hover:shadow-xl hover:border-indigo-300">
                <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i data-lucide="graduation-cap" class="w-7 h-7"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Student</h2>
                <p class="text-slate-500 text-sm">Pay fees, view history, and download receipts.</p>
                <div class="mt-6 flex items-center justify-center text-indigo-600 font-semibold text-sm">
                    Enter Portal <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                </div>
            </div>

            <div onclick="location.href='/admin/login'"
                 class="role-card group cursor-pointer bg-white p-8 rounded-3xl shadow-sm border border-slate-200 transition-all duration-300 hover:shadow-xl hover:border-slate-900">
                <div class="w-14 h-14 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-slate-900 group-hover:text-white transition-colors">
                    <i data-lucide="shield-check" class="w-7 h-7"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Administrator</h2>
                <p class="text-slate-500 text-sm">Manage student records and track fee collections.</p>
                <div class="mt-6 flex items-center justify-center text-slate-900 font-semibold text-sm">
                    Staff Login <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                </div>
            </div>

        </div>

        <footer class="mt-16 text-slate-400 text-sm">
            &copy; 2026 EduPay Management System. All rights reserved.
        </footer>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
