<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Fees | EduPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="w-64 bg-indigo-900 text-white hidden md:flex flex-col min-h-screen sticky top-0">
        <div class="p-8 text-2xl font-bold flex items-center gap-2">
            <i data-lucide="shield-check"></i> EduPay
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="/student/dashboard" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="/student/pay-fees" class="flex items-center gap-3 p-3 rounded-xl bg-white/20 font-bold">
                <i data-lucide="credit-card"></i> Pay Fees
            </a>
            <a href="/student/payment-history" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition">
                <i data-lucide="history"></i> History
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <div class="max-w-5xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Fee Management</h1>
                    <p class="text-slate-500">Review and settle your outstanding academic dues.</p>
                </div>

                <div class="flex items-center gap-2 bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                    <button onclick="applyFilter('All')" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium transition active-filter bg-indigo-600 text-white">All</button>
                    <button onclick="applyFilter('Yearly')" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition">Yearly</button>
                    <button onclick="applyFilter('Half-Yearly')" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition">Term</button>
                    <button onclick="applyFilter('Monthly')" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition">Monthly</button>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Fee Name</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Type</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Total</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Balance</th>
                                <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="feesTable" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 modal-animate">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Complete Payment</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>

            <div class="mb-6">
                <p id="modalFeeName" class="text-sm font-semibold text-indigo-600 bg-indigo-50 px-3 py-1 inline-block rounded-full mb-4">Tuition Fee</p>
                <label class="block text-sm font-bold text-slate-700 mb-2">Enter Amount (₹)</label>
                <input type="number" id="payAmount"
                       class="w-full px-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-2xl font-bold focus:border-indigo-500 outline-none transition-all"
                       placeholder="0.00">
                <p id="modalBalanceHint" class="mt-2 text-xs text-slate-400">Maximum payable: ₹0</p>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="confirmPayment()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="credit-card" class="w-5 h-5"></i> Confirm & Pay
                </button>
                <button onclick="closeModal()" class="w-full py-3 text-slate-500 font-medium hover:text-slate-700 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentFeeId = null;
        let currentBalance = 0;

        async function applyFilter(type) {
            // Update UI Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('text-slate-600');
            });
            event.target.classList.add('bg-indigo-600', 'text-white');

            const res = await fetch(`/student/pay-fees/data?filter=${type}`);
            const fees = await res.json();
            const tbody = document.getElementById('feesTable');

            tbody.innerHTML = fees.map(f => `
                <tr class="hover:bg-slate-50/50 transition">
                    <td class="px-6 py-5">
                        <p class="font-bold text-slate-700">${f.fee_name}</p>
                    </td>
                    <td class="px-6 py-5">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg uppercase tracking-wider">${f.type}</span>
                    </td>
                    <td class="px-6 py-5 text-slate-500 font-medium">₹${f.total}</td>
                    <td class="px-6 py-5">
                        <p class="text-red-500 font-bold">₹${f.balance}</p>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="openModal(${f.fee_id}, '${f.fee_name}', ${f.balance})"
                                class="bg-slate-900 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-indigo-600 transition shadow-sm">
                            Pay
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function openModal(id, name, balance) {
            currentFeeId = id;
            currentBalance = balance;
            document.getElementById('modalFeeName').innerText = name;
            document.getElementById('modalBalanceHint').innerText = `Maximum payable: ₹${balance}`;
            document.getElementById('payAmount').value = balance;
            document.getElementById('paymentModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.add('hidden');
        }

        async function confirmPayment() {
            const amount = document.getElementById('payAmount').value;
            if (amount <= 0 || amount > currentBalance) {
                alert("Please enter a valid amount.");
                return;
            }

            const res = await fetch('/student/pay-fees/pay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fee_id: currentFeeId, amount: amount })
            });

            if (res.ok) {
                alert("Payment successful!");
                closeModal();
                applyFilter('All'); // Refresh data
            } else {
                const err = await res.json();
                alert(err.error || "Payment failed");
            }
        }

        // Initial Load
        applyFilter('All');
        lucide.createIcons();
    </script>
</body>
</html>
