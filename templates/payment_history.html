<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History | EduPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .receipt-btn:hover { background-color: #f8fafc; border-color: #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8 text-2xl font-bold flex items-center gap-2 text-indigo-400">
            <i data-lucide="history"></i> EduPay
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="/student/dashboard" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition text-slate-400">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="/student/pay-fees" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 transition text-slate-400">
                <i data-lucide="credit-card"></i> Pay Fees
            </a>
            <a href="/student/payment-history" class="flex items-center gap-3 p-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg shadow-indigo-600/20">
                <i data-lucide="receipt"></i> History
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <a href="/logout" class="flex items-center gap-3 p-3 text-rose-400 hover:bg-rose-400/10 rounded-xl transition">
                <i data-lucide="log-out"></i> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Transaction History</h1>
                    <p class="text-slate-500 mt-1">View and download your official fee receipts.</p>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="check-circle-2"></i>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase font-bold text-slate-400 leading-none">Status</p>
                        <p class="text-sm font-bold text-slate-700">All Clear</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Transaction Info</th>
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Type</th>
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest text-center">Amount</th>
                                <th class="px-8 py-5 text-xs font-bold text-slate-400 uppercase tracking-widest text-right">Receipt</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable" class="divide-y divide-slate-50">
                            <tr>
                                <td colspan="4" class="px-8 py-20 text-center text-slate-400">
                                    <div class="flex flex-col items-center gap-2">
                                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                                        <p class="text-sm font-medium">Fetching history...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="emptyState" class="hidden text-center py-20">
                <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                    <i data-lucide="info" class="w-8 h-8"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">No transactions found</h3>
                <p class="text-slate-500">You haven't made any payments yet.</p>
            </div>
        </div>
    </main>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch("/student/payment-history/data");
                const history = await res.json();
                const tbody = document.getElementById('historyTable');

                if (history.length === 0) {
                    tbody.innerHTML = '';
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }

                tbody.innerHTML = history.map(item => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                                    <i data-lucide="file-check-2" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-800">${item.fee_name}</p>
                                    <p class="text-xs text-slate-400 font-medium italic">${item.date}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-full uppercase tracking-wider">
                                ${item.type}
                            </span>
                        </td>
                        <td class="px-8 py-6 text-center">
                            <p class="text-lg font-bold text-slate-700">₹${item.amount}</p>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <a href="/student/receipt/${item.fee_id}"
                               class="receipt-btn inline-flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 transition-all shadow-sm">
                                <i data-lucide="download" class="w-4 h-4"></i>
                                PDF Receipt
                            </a>
                        </td>
                    </tr>
                `).join('');

                lucide.createIcons();
            } catch (err) {
                console.error("Failed to load history", err);
            }
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
        lucide.createIcons();
    </script>
</body>
</html>
