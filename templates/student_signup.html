<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Signup | EduPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:20px_20px]">

    <div class="glass-card w-full max-w-2xl rounded-3xl shadow-2xl shadow-indigo-100/50 p-8 border border-white">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-800">Create Account</h2>
            <p class="text-slate-500 mt-1">Join the EduPay portal to manage your college fees.</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="name" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">College Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="name@tcetmumbai.in">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="johndoe123">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Department</label>
                    <input type="text" id="department" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. IT, CS, Mech">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Year Range</label>
                    <input type="text" id="year_range" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. 2024-28">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">ABC ID</label>
                    <input type="text" id="abc_id" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Academic Bank of Credits ID">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Blood Group (Optional)</label>
                    <input type="text" id="blood_group" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. O+ve">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center space-x-2">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    <span>Create My Account</span>
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-slate-500 text-sm">
            Already have an account?
            <a href="/student/login" class="text-indigo-600 font-bold hover:underline">Log in here</a>
        </p>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById("signupForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            let email = document.getElementById("email").value.trim();

            // Frontend Validation
            if (!email.endsWith("@tcetmumbai.in")) {
                alert("Please use your official @tcetmumbai.in email address.");
                return;
            }

            // Loading State
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Processing...</span>`;

            try {
                const response = await fetch("/signup/student", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        email: email,
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value,
                        department: document.getElementById("department").value,
                        year_range: document.getElementById("year_range").value,
                        abc_id: document.getElementById("abc_id").value,
                        blood_group: document.getElementById("blood_group").value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Account Created! Redirecting to login...");
                    window.location.href = data.redirect || "/login/student";
                } else {
                    alert(data.error || "Signup failed");
                    btn.disabled = false;
                    btn.innerHTML = `<i data-lucide="user-plus" class="w-5 h-5"></i><span>Create My Account</span>`;
                    lucide.createIcons();
                }
            } catch (err) {
                alert("Server error. Please try again later.");
                btn.disabled = false;
                btn.innerText = "Create My Account";
            }
        });
    </script>
</body>
</html>
